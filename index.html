<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StellarUI</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-wrapper site-wrapper--header">
        <h1>
          <img
            src="assets/icons/moon-stars.svg"
            alt="StellarUI logo"
            class="site-brand__icon"
            aria-hidden="true"
          />
          <span>StellarUI</span>
        </h1>

        <button
          class="site-header__menu-toggle"
          type="button"
          aria-controls="menu-sidebar"
          aria-expanded="false"
          aria-label="Open menu"
        >
          <span class="site-header__menu-toggle-line"></span>
          <span class="site-header__menu-toggle-line"></span>
          <span class="site-header__menu-toggle-line"></span>
        </button>

        <nav class="site-header__nav">
          <ul class="site-header__menu">
            <li class="site-header__link" href="/">Home</li>
            <li class="site-header__link" href="#mission">Mission</li>
            <li class="site-header__link" href="#technology">Technology</li>
            <li class="site-header__link" href="#explore">Explore</li>
            <li class="site-header__link" href="#about">About</li>
          </ul>
        </nav>

        <div class="site-header-actions">
          <div class="site-header__search">
            <img
              src="assets/icons/search-icon.svg"
              alt="Search icon"
              class="site-header__search-icon"
              aria-hidden="true"
            />

            <input
              type="search"
              name=""
              id=""
              class="site-header__search-input"
              placeholder="Search missions, planets..."
            />
          </div>

          <button class="site-header__cta" type="button">Launch App</button>
        </div>
      </div>
    </header>

    <div class="mobile-sidebar__overlay" data-sidebar-close></div>

    <aside class="mobile-sidebar" id="mobile-sidebar" aria-hidden="true">
      <div class="mobile-sidebar__top">
        <p class="mobile-sidebar__brand">
          <img
            src="assets/icons/moon-stars.svg"
            alt="StellarUI logo"
            class="site-brand__icon"
            aria-hidden="true"
          />
          <span>StellarUI</span>
        </p>
        <button
          class="mobile-sidebar__close"
          data-sidebar-close
          type="button"
          aria-label="Close menu"
        >
          &times;
        </button>
      </div>
    </aside>
  </body>
</html>
